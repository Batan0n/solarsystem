<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Solar System</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#00000e;overflow:hidden;
  font-family:'Share Tech Mono',monospace;color:rgba(220,210,190,0.9);user-select:none;}
canvas{position:fixed;inset:0;display:block}
#bg{z-index:0;pointer-events:none}
#main{z-index:1;cursor:grab}
#main.grabbing{cursor:grabbing}

#title{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:.45em;text-transform:uppercase;
  color:#c8a84b;opacity:.72;white-space:nowrap;text-shadow:0 0 24px rgba(200,168,75,.4);
}
#hint{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;
  font-size:9px;letter-spacing:.16em;color:rgba(180,170,140,.38);text-transform:uppercase;white-space:nowrap;
}
#hint b{color:rgba(200,168,75,.5);font-weight:normal}
#spd-wrap{
  position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.sl{font-size:8px;letter-spacing:.14em;color:rgba(180,170,140,.38);text-transform:uppercase}
input[type=range]{
  -webkit-appearance:none;writing-mode:vertical-lr;direction:rtl;
  width:3px;height:96px;background:rgba(200,168,75,.1);outline:none;border-radius:2px;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:#c8a84b;box-shadow:0 0 6px rgba(200,168,75,.55);
}
#resetBtn{
  position:fixed;left:18px;bottom:20px;z-index:10;font-family:'Share Tech Mono',monospace;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,168,75,.5);
  background:rgba(200,168,75,.04);border:1px solid rgba(200,168,75,.16);padding:5px 10px;
  cursor:pointer;border-radius:2px;transition:all .2s;
}
#resetBtn:hover{background:rgba(200,168,75,.12);color:rgba(200,168,75,.9)}

/* ══════════════════════════════════
   DETAIL PANEL
══════════════════════════════════ */
#panel{
  position:fixed;top:50%;right:-370px;transform:translateY(-50%);
  z-index:20;width:330px;
  background:rgba(3,6,18,0.97);border:1px solid rgba(200,168,75,.22);
  border-radius:8px;overflow:hidden;
  transition:right .38s cubic-bezier(.22,.68,0,1.2);
  box-shadow:0 0 60px rgba(0,0,0,.9),0 0 30px rgba(200,168,75,.04);
}
#panel.open{right:18px}
#panelClose{
  position:absolute;top:10px;right:12px;font-size:16px;line-height:1;
  cursor:pointer;color:rgba(200,168,75,.45);z-index:22;transition:color .2s;background:none;border:none;
}
#panelClose:hover{color:rgba(200,168,75,.95)}

/* Three.js WebGL preview */
#previewWrap{
  position:relative;width:100%;height:240px;
  background:radial-gradient(ellipse at 50% 50%, rgba(8,14,40,1) 0%, #000008 100%);
  overflow:hidden;
}
/* subtle star dots in preview bg */
#previewWrap::before{
  content:'';position:absolute;inset:0;z-index:0;
  background-image:
    radial-gradient(circle,rgba(255,255,255,.7) 1px,transparent 1px),
    radial-gradient(circle,rgba(255,255,255,.4) 1px,transparent 1px);
  background-size:40px 40px, 23px 23px;
  background-position:0 0, 12px 12px;
  opacity:.07;pointer-events:none;
}
#threeCanvas{
  position:absolute;inset:0;width:100%!important;height:100%!important;
  z-index:1;display:block;
}
/* drag hint inside preview */
#prevHint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  z-index:3;font-size:8px;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(200,168,75,.4);pointer-events:none;white-space:nowrap;
  transition:opacity .5s;
}
/* loading overlay */
#texLoading{
  position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(3,6,18,0.85);gap:10px;
  font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(200,168,75,.55);
  transition:opacity .4s;
}
#texLoading.hidden{opacity:0;pointer-events:none}
.spinner{width:26px;height:26px;border-radius:50%;border:2px solid rgba(200,168,75,.15);border-top-color:rgba(200,168,75,.7);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* panel body */
#panelBody{padding:14px 16px 18px}
#panelName{
  font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#e8d898;margin-bottom:3px;text-shadow:0 0 20px rgba(200,168,75,.3);
}
#panelType{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:rgba(200,168,75,.52);margin-bottom:14px}
#panelStats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat{background:rgba(200,168,75,.04);border:1px solid rgba(200,168,75,.1);border-radius:4px;padding:7px 10px}
.stat-label{font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(180,170,140,.48);margin-bottom:3px}
.stat-val{font-size:13px;color:rgba(230,215,170,.95);letter-spacing:.04em}
#panelDesc{font-size:10px;line-height:1.7;color:rgba(190,180,155,.68);border-top:1px solid rgba(200,168,75,.1);padding-top:12px}
#panelFact{margin-top:10px;background:rgba(200,168,75,.05);border-left:2px solid rgba(200,168,75,.38);padding:8px 10px;font-size:9.5px;line-height:1.6;color:rgba(200,190,160,.62);border-radius:0 4px 4px 0}
#panelFact b{color:rgba(200,168,75,.78);font-weight:normal}
#texCredit{font-size:7px;letter-spacing:.1em;color:rgba(150,140,120,.32);text-align:center;padding:0 0 8px;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>

<div id="title">THE COPERNICAN MODEL</div>
<div id="hint">
  <b>Left-drag</b> orbit &nbsp;·&nbsp;
  <b>Right-drag</b> pan &nbsp;·&nbsp;
  <b>Scroll</b> zoom &nbsp;·&nbsp;
  <b>Click planet</b> for 3D view
</div>
<div id="spd-wrap">
  <div class="sl">Fast</div>
  <input type="range" id="spdRange" min="0" max="5" step="0.05" value="1">
  <div class="sl">Slow</div>
  <div class="sl" id="spdLbl" style="margin-top:2px">1.0×</div>
</div>
<button id="resetBtn">⟳ Reset</button>

<div id="panel">
  <button id="panelClose">✕</button>
  <div id="previewWrap">
    <canvas id="threeCanvas"></canvas>
    <div id="prevHint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>
    <div id="texLoading"><div class="spinner"></div><span id="loadMsg">Loading…</span></div>
  </div>
  <div id="panelBody">
    <div id="panelName">—</div>
    <div id="panelType">—</div>
    <div id="panelStats"></div>
    <div id="panelDesc">—</div>
    <div id="panelFact"></div>
  </div>
  <div id="texCredit">Procedural textures · Three.js WebGL · No external assets</div>
</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════
   PROCEDURAL CANVAS TEXTURES
   Painted directly into an offscreen canvas and fed to
   Three.js as a CanvasTexture — no external loading,
   no CORS issues, instant, always works.
   Uses the same equirectangular UV mapping as Blender.
═══════════════════════════════════════════════════ */

// Paint one pixel given normalised surface coords (nx,ny,nz) on unit sphere
// Returns [r,g,b] 0-255
const SURFACE_FN = {
  Mercury(nx,ny,nz){
    const n = noise(nx*7,ny*6,nz*8)*0.5 + noise(nx*18,ny*15,nz*20)*0.25 + noise(nx*35,ny*30,nz*38)*0.12;
    const crater = Math.max(0, 1-Math.hypot(nx-0.3,ny-0.4,nz-0.5)*6)*0.12;
    const v = 0.42 + n*0.18 + crater;
    return [v*188|0, v*178|0, v*162|0];
  },
  Venus(nx,ny,nz){
    const swirl = noise(nx*4+0.3,ny*3.5,nz*5)*0.5 + noise(nx*10,ny*9,nz*11)*0.25;
    const v = 0.52 + swirl*0.22;
    return [v*228|0, v*178|0, v*72|0];
  },
  Earth(nx,ny,nz){
    const land = noise(nx*3.5,ny*3,nz*4)*0.5 + noise(nx*7,ny*6,nz*8)*0.25 + noise(nx*14,ny*12,nz*15)*0.12;
    const cloud= noise(nx*11+0.5,ny*9+0.2,nz*12)*0.5 + noise(nx*20,ny*18,nz*22)*0.25;
    const abslat = Math.abs(Math.asin(Math.max(-1,Math.min(1,ny))));
    const ice = Math.max(0,(abslat-1.18)/(Math.PI/2-1.18));
    if(ice>0.3){ const w=Math.min(1,ice*2.5); return [210+w*45|0, 222+w*33|0, 240+w*15|0]; }
    if(cloud>0.38){ const cf=Math.min(1,(cloud-0.38)*4.5); return [200*cf+20*(1-cf)|0, 220*cf+75*(1-cf)|0, 245*cf+150*(1-cf)|0]; }
    if(land>0.06){
      if(abslat>0.7) return [105,138,82];
      if(abslat>0.3) return [58,118,42];
      const d=land*0.4; return [38+d*30|0, 108+d*20|0, 40+d*10|0];
    }
    const dep=Math.max(0,-land*2.5);
    return [14+dep*10|0, 62+dep*22|0, 145+dep*38|0];
  },
  Mars(nx,ny,nz){
    const rock = noise(nx*5,ny*4.5,nz*6)*0.5 + noise(nx*12,ny*11,nz*13)*0.25 + noise(nx*24,ny*22,nz*26)*0.1;
    const v = 0.42 + rock*0.22;
    const abslat = Math.abs(Math.asin(Math.max(-1,Math.min(1,ny))));
    if(abslat>1.18){ const w=Math.min(1,(abslat-1.18)*7); return [200*w+v*168*(1-w)|0, 185*w+v*82*(1-w)|0, 175*w+v*62*(1-w)|0]; }
    // Canyon-like dark streaks
    const canyon = noise(nx*20,ny*2,nz*20)*0.5;
    const cv = canyon>0.3 ? 0.82 : 1.0;
    return [v*cv*188+18|0, v*cv*78|0, v*cv*52|0];
  },
  Jupiter(nx,ny,nz){
    const lat = Math.asin(Math.max(-1,Math.min(1,ny)));
    const band = Math.sin(lat*11+0.5)*0.45 + Math.sin(lat*6.5+0.2)*0.28 + noise(nx*2,ny*22,nz*2)*0.12;
    const turb = noise(nx*8+lat*3,ny*1,nz*8)*0.08;
    const v = 0.48 + band*0.28 + turb;
    // GRS
    const px=nx*Math.cos(-0.3)-nz*Math.sin(-0.3), pz=nx*Math.sin(-0.3)+nz*Math.cos(-0.3);
    const grs = Math.max(0,1-Math.hypot(px-0.5,ny-0.12)*5);
    if(grs>0.15) return [(v*210+grs*55)|0, (v*120-grs*40)|0, (v*55-grs*25)|0];
    if(v>0.72) return [v*238|0, v*188|0, v*108|0];
    if(v>0.55) return [v*208|0, v*148|0, v*78|0];
    return [v*172|0, v*108|0, v*48|0];
  },
  Saturn(nx,ny,nz){
    const lat = Math.asin(Math.max(-1,Math.min(1,ny)));
    const band = Math.sin(lat*9+0.4)*0.4 + Math.sin(lat*4.5)*0.22 + noise(nx*2,ny*18,nz*2)*0.08;
    const v = 0.50 + band*0.24;
    if(v>0.66) return [v*248|0, v*218|0, v*128|0];
    return [v*218|0, v*178|0, v*92|0];
  },
  Uranus(nx,ny,nz){
    const lat = Math.asin(Math.max(-1,Math.min(1,ny)));
    const soft = Math.sin(lat*3.5)*0.12 + noise(nx*3,ny*10,nz*3)*0.06;
    const v = 0.60 + soft;
    return [v*82|0, v*208|0, v*202|0];
  },
  Neptune(nx,ny,nz){
    const storm = noise(nx*6+0.3,ny*5.5,nz*7)*0.4 + noise(nx*13,ny*12,nz*14)*0.18;
    const v = 0.42 + storm*0.22;
    // Dark spot
    const ds = Math.max(0,1-Math.hypot(nx-0.15,ny+0.1,nz-0.55)*5.5);
    if(ds>0.1) return [v*28-ds*8|0, v*82-ds*25|0, v*225+ds*30|0];
    return [v*32+10|0, v*88+12|0, v*230+18|0];
  }
};

// Smooth 3D value noise — no external dep needed
function noise(x,y,z){
  const ix=Math.floor(x),iy=Math.floor(y),iz=Math.floor(z);
  const fx=x-ix,fy=y-iy,fz=z-iz;
  const ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy),uz=fz*fz*(3-2*fz);
  const h=(a,b,c)=>Math.sin(a*127.1+b*311.7+c*74.3)*43758.5453%1;
  return (
    h(ix,iy,iz)*(1-ux)*(1-uy)*(1-uz)+
    h(ix+1,iy,iz)*ux*(1-uy)*(1-uz)+
    h(ix,iy+1,iz)*(1-ux)*uy*(1-uz)+
    h(ix+1,iy+1,iz)*ux*uy*(1-uz)+
    h(ix,iy,iz+1)*(1-ux)*(1-uy)*uz+
    h(ix+1,iy,iz+1)*ux*(1-uy)*uz+
    h(ix,iy+1,iz+1)*(1-ux)*uy*uz+
    h(ix+1,iy+1,iz+1)*ux*uy*uz
  );
}

// Build an equirectangular canvas texture for Three.js (512×256 — same as "2K")
const _texCache = {};
function buildCanvasTex(planetName){
  if(_texCache[planetName]) return _texCache[planetName];
  const TW=512, TH=256;
  const oc=document.createElement('canvas'); oc.width=TW; oc.height=TH;
  const ox=oc.getContext('2d');
  const imgD=ox.createImageData(TW,TH); const d=imgD.data;
  const fn=SURFACE_FN[planetName];
  for(let py=0;py<TH;py++){
    const lat=(py/TH-0.5)*Math.PI;
    const ny=Math.sin(lat), cosLat=Math.cos(lat);
    for(let px=0;px<TW;px++){
      const lon=(px/TW)*Math.PI*2-Math.PI;
      const nx=cosLat*Math.cos(lon), nz=cosLat*Math.sin(lon);
      const [r,g,b]=fn(nx,ny,nz);
      const i=(py*TW+px)*4;
      d[i]=Math.min(255,Math.max(0,r));
      d[i+1]=Math.min(255,Math.max(0,g));
      d[i+2]=Math.min(255,Math.max(0,b));
      d[i+3]=255;
    }
  }
  ox.putImageData(imgD,0,0);
  const tex=new THREE.CanvasTexture(oc);
  tex.wrapS=THREE.RepeatWrapping;
  tex.needsUpdate=true;
  _texCache[planetName]=tex;
  return tex;
}

// Build Saturn ring texture procedurally
function buildSaturnRingTex(){
  const TW=256, TH=1;
  const oc=document.createElement('canvas'); oc.width=TW; oc.height=TH;
  const ox=oc.getContext('2d');
  const imgD=ox.createImageData(TW,TH); const d=imgD.data;
  for(let px=0;px<TW;px++){
    const t=px/TW;
    // Ring bands: D,C,B,Cassini gap,A rings
    let alpha=0, r=210,g=185,b=110;
    if(t<0.08)      { alpha=t*2; r=180;g=160;b=100; }
    else if(t<0.28) { alpha=0.45+Math.sin(t*80)*0.12; }
    else if(t<0.32) { alpha=0.65+Math.sin(t*200)*0.15; r=225;g=200;b=120; }
    else if(t<0.42) { alpha=0.02; } // Cassini Division
    else if(t<0.78) { alpha=0.55+Math.sin(t*60)*0.1; r=200;g=175;b=105; }
    else             { alpha=(1-t)*2*0.3; }
    const i=px*4; d[i]=r; d[i+1]=g; d[i+2]=b; d[i+3]=alpha*255|0;
  }
  ox.putImageData(imgD,0,0);
  const tex=new THREE.CanvasTexture(oc);
  tex.needsUpdate=true;
  return tex;
}

/* ═══════════════════════════════════════════════════
   PLANET DATABASE
═══════════════════════════════════════════════════ */
const PLANETS = [
  { name:'Mercury', r:4, orbit:55,  speed:4.15, colors:['#888','#bbb','#555'], rings:null,

    type:'Terrestrial Planet', atmos:{r:220,g:180,b:80},
    stats:{'Diameter':'12,104 km','Mass':'4.87×10²⁴ kg','Day':'243 Earth days','Year':'225 Earth days','Moons':'0','Temp':'465°C (avg)'},

  { name:'Earth', r:7,   orbit:130, speed:1.0,  colors:['#1a5fa0','#3a8fd0','#1a7035'], rings:null,
    type:'Terrestrial Planet', atmos:{r:80,g:160,b:255},
    stats:{'Diameter':'12,742 km','Mass':'5.97×10²⁴ kg','Day':'24 hours','Year':'365.25 days','Moons':'1','Temp':'−88 / 58°C'},

  { name:'Mars', r:5,    orbit:175, speed:0.532, colors:['#a03010','#d04820','#601808'], rings:null,
    type:'Terrestrial Planet', atmos:{r:200,g:120,b:60},
    stats:{'Diameter':'6,779 km','Mass':'6.39×10²³ kg','Day':'24h 37m','Year':'687 Earth days','Moons':'2','Temp':'−125 / 20°C'},

  { name:'Jupiter', r:20, orbit:255, speed:0.084, colors:['#b06828','#dca058','#7a3e18','#c88848'],
    rings:null, type:'Gas Giant', atmos:null,

  { name:'Saturn', r:16,  orbit:335, speed:0.034, colors:['#c8a848','#e8d080','#988030','#d8b858'],
    rings:{inner:1.22,outer:2.35,color:'rgba(210,185,110,'},
    type:'Gas Giant', atmos:null,
    stats:{'Diameter':'116,460 km','Mass':'5.68×10²⁶ kg','Day':'10h 42m','Year':'29.5 Earth yrs','Moons':'146','Temp':'−138°C (cloud top)'},

    fact:'Saturn\'s rings span 282,000 km across but are only 10–100 metres thick in places — thinner relative to their width than a sheet of paper.' },
  { name:'Uranus', r:11,  orbit:410, speed:0.012, colors:['#48b8b8','#80d8d8','#288888'],
    rings:{inner:1.28,outer:1.85,color:'rgba(110,220,220,'},
    type:'Ice Giant', atmos:{r:100,g:210,b:210},
    stats:{'Diameter':'50,724 km','Mass':'8.68×10²⁵ kg','Day':'17h 14m','Year':'84 Earth yrs','Moons':'28','Temp':'−195°C (avg)'},

  { name:'Neptune', r:10, orbit:475, speed:0.006, colors:['#1830a0','#3858d8','#101870'], rings:null,
    type:'Ice Giant', atmos:{r:50,g:100,b:230},
    stats:{'Diameter':'49,244 km','Mass':'1.02×10²⁶ kg','Day':'16h 6m','Year':'165 Earth yrs','Moons':'16','Temp':'−200°C (avg)'},
    desc:'Neptune has the strongest sustained winds in the solar system at up to 2,100 km/h. Its largest moon Triton orbits in the opposite direction to Neptune\'s rotation.',
    fact:'Neptune was predicted mathematically before it was ever observed — gravitational effects on Uranus led astronomers straight to it in 1846.' },

const SUN_R=28;
const DEF={polar:0.62,azim:0.18,dist:1050,tx:0,ty:0};
const CAM={...DEF,targetDist:DEF.dist,vPolar:0,vAzim:0,drag:false,dragBtn:0,lx:0,ly:0};
const FOV_Y=50*Math.PI/180;
let speedMul=1, angles=PLANETS.map((_,i)=>i*(Math.PI*2/8)*1.4), lastTs=0;

/* ─── 2D CANVAS SETUP ─── */
const bgC=document.getElementById('bg'),bgX=bgC.getContext('2d');
const C=document.getElementById('main'),ctx=C.getContext('2d');
function resize(){C.width=bgC.width=innerWidth;C.height=bgC.height=innerHeight;buildStars();}
function buildStars(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  const N=Math.floor(bgC.width*bgC.height/700);

  const W=C.width,H=C.height;

/* ═══════════════════════════════════════════════════

const threeCanvas = document.getElementById('threeCanvas');
const previewWrap = document.getElementById('previewWrap');

// Three.js scene setup
const renderer = new THREE.WebGLRenderer({canvas:threeCanvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

const prevScene  = new THREE.Scene();
const prevCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
prevCamera.position.set(0, 0, 2.8);

// Lighting — sun from upper right (same as our 2D scene)

// Sphere geometry — high-res like Blender's UV sphere
const sphereGeo = new THREE.SphereGeometry(1, 64, 32);

let prevMesh   = null;   // current planet mesh
let ringMesh   = null;   // Saturn ring mesh

const prevOrbit = {
  active:false, lx:0, ly:0,
  polarAngle: Math.PI/2,    // start looking from side
  azimAngle: 0,
  radius: 2.8,
  targetRadius: 2.8,
};

threeCanvas.addEventListener('mousedown', e=>{
  prevOrbit.active=true; prevOrbit.lx=e.clientX; prevOrbit.ly=e.clientY;

  if(!prevOrbit.active) return;
  const dx=e.clientX-prevOrbit.lx, dy=e.clientY-prevOrbit.ly;
  prevOrbit.azimAngle  -= dx*0.008;
  prevOrbit.polarAngle  = Math.max(0.1, Math.min(Math.PI-0.1, prevOrbit.polarAngle+dy*0.008));

function loadPlanetIntoScene(planet){
  // Clear previous objects
  if(prevMesh){ prevScene.remove(prevMesh); prevMesh.geometry.dispose(); prevMesh.material.dispose(); prevMesh=null; }
  if(ringMesh){ prevScene.remove(ringMesh); ringMesh.geometry.dispose(); ringMesh.material.dispose(); ringMesh=null; }
  if(atmMesh) { prevScene.remove(atmMesh);  atmMesh.geometry.dispose();  atmMesh.material.dispose();  atmMesh=null; }

  prevOrbit.polarAngle=Math.PI/2; prevOrbit.azimAngle=0.4;
  prevOrbit.radius=prevOrbit.targetRadius = planet.name==='Saturn'?3.8:2.8;

  // Show brief building indicator (canvas texture is fast but not instant)
  loadMsg.textContent='Building texture…';
  loadingEl.classList.remove('hidden');

  // Yield to browser so spinner renders, then build texture synchronously
  setTimeout(()=>{
    // ── Build procedural canvas texture (no network needed)
    const tex = buildCanvasTex(planet.name);
    tex.anisotropy = Math.min(4, renderer.capabilities.getMaxAnisotropy());

    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      roughness: planet.name==='Earth' ? 0.62 : 0.82,
      metalness: 0.0,
    });
    const tilts={Mercury:0.034,Venus:177.4,Earth:23.4,Mars:25.2,Jupiter:3.1,Saturn:26.7,Uranus:97.8,Neptune:28.3};
    prevMesh = new THREE.Mesh(sphereGeo, mat);
    prevMesh.rotation.z = (tilts[planet.name]||0) * Math.PI/180;
    prevScene.add(prevMesh);

    // ── Saturn rings with procedural band texture
    if(planet.name==='Saturn'){
      const ringTex = buildSaturnRingTex();
      const ringGeo = new THREE.RingGeometry(1.22, 2.35, 128);
      // Remap UVs radially so the band texture wraps from inner to outer edge
      const pos=ringGeo.attributes.position, uv=ringGeo.attributes.uv;
      for(let i=0;i<pos.count;i++){
        const vv=new THREE.Vector3().fromBufferAttribute(pos,i);
        const t=(vv.length()-1.22)/(2.35-1.22);
        uv.setXY(i, t, 0.5);
      }
      uv.needsUpdate=true;
      const ringMat=new THREE.MeshBasicMaterial({map:ringTex,side:THREE.DoubleSide,transparent:true,depthWrite:false});
      ringMesh=new THREE.Mesh(ringGeo,ringMat);
      ringMesh.rotation.x=Math.PI/2;
      ringMesh.rotation.z=26.7*Math.PI/180;
      prevScene.add(ringMesh);
    } else if(planet.rings){
      // Uranus — thin dark rings
      const ringGeo=new THREE.RingGeometry(planet.rings.inner, planet.rings.outer, 96);
      const col=planet.rings.color.replace('rgba(','').split(',');
      const ringMat=new THREE.MeshBasicMaterial({
        color:new THREE.Color(parseInt(col[0])/255,parseInt(col[1])/255,parseInt(col[2])/255),
        side:THREE.DoubleSide,transparent:true,opacity:0.45,depthWrite:false
      });
      ringMesh=new THREE.Mesh(ringGeo,ringMat);
      ringMesh.rotation.x=Math.PI/2;
      prevScene.add(ringMesh);
    }

    // ── Atmosphere glow
    if(planet.atmos){
      const{r,g,b}=planet.atmos;
      const atmGeo=new THREE.SphereGeometry(1.055,32,16);
      const atmMat=new THREE.MeshBasicMaterial({
        color:new THREE.Color(r/255,g/255,b/255),
        transparent:true, opacity:0.09, side:THREE.BackSide, depthWrite:false
      });
      atmMesh=new THREE.Mesh(atmGeo,atmMat);
      prevScene.add(atmMesh);
    }

    loadingEl.classList.add('hidden');
  }, 30);
}

// Resize Three.js renderer to match preview wrap
function resizeThreeRenderer(){
  const w=previewWrap.offsetWidth, h=previewWrap.offsetHeight;
  if(w>0&&h>0){
    renderer.setSize(w,h,false);
    prevCamera.aspect=w/h;
    prevCamera.updateProjectionMatrix();
  }
}
resizeThreeRenderer();
new ResizeObserver(resizeThreeRenderer).observe(previewWrap);

// Three.js render loop (runs always, lightweight when panel is closed)
function threeLoop(){
  requestAnimationFrame(threeLoop);
  if(!prevMesh) return;

  // Auto-rotate planet
  prevMesh.rotation.y += 0.004;
  if(ringMesh && prevPlanet && prevPlanet.name!=='Saturn') ringMesh.rotation.z+=0.004;

  // Smooth zoom
  prevOrbit.radius += (prevOrbit.targetRadius - prevOrbit.radius)*0.1;

  // Orbit camera
  const r=prevOrbit.radius;
  prevCamera.position.set(
    r*Math.sin(prevOrbit.polarAngle)*Math.sin(prevOrbit.azimAngle),
    r*Math.cos(prevOrbit.polarAngle),
    r*Math.sin(prevOrbit.polarAngle)*Math.cos(prevOrbit.azimAngle)
  );
  prevCamera.lookAt(0,0,0);
  renderer.render(prevScene,prevCamera);
}
threeLoop();

/* ─── PANEL OPEN / CLOSE ─── */
const panel=document.getElementById('panel');
document.getElementById('panelClose').addEventListener('click',()=>{
  panel.classList.remove('open');
  prevPlanet=null;
  // Clear scene to free GPU memory
  if(prevMesh){prevScene.remove(prevMesh);prevMesh.material.map&&prevMesh.material.map.dispose();prevMesh.material.dispose();prevMesh=null;}
  if(ringMesh){prevScene.remove(ringMesh);ringMesh.material.map&&ringMesh.material.map.dispose();ringMesh.material.dispose();ringMesh=null;}
  if(atmMesh) {prevScene.remove(atmMesh);atmMesh.material.dispose();atmMesh=null;}
});

function openPanel(idx){
  const p=PLANETS[idx];
  prevPlanet=p;
  document.getElementById('panelName').textContent=p.name;
  document.getElementById('panelType').textContent=p.type;
  const sg=document.getElementById('panelStats');sg.innerHTML='';
  Object.entries(p.stats).forEach(([k,v])=>{sg.innerHTML+=`<div class="stat"><div class="stat-label">${k}</div><div class="stat-val">${v}</div></div>`;});
  document.getElementById('panelDesc').textContent=p.desc;
  document.getElementById('panelFact').innerHTML=`<b>Did you know?</b> ${p.fact}`;
  panel.classList.add('open');
  // Small delay to let panel slide in before loading GPU texture
  setTimeout(()=>{ resizeThreeRenderer(); loadPlanetIntoScene(p); },120);
}

/* ─── SOLAR SYSTEM MAIN LOOP ─── */
function frame(ts){
  const dt=Math.min((ts-lastTs)/1000,0.05);lastTs=ts;
  const W=C.width,H=C.height;ctx.clearRect(0,0,W,H);
  CAM.dist+=(CAM.targetDist-CAM.dist)*0.12;
  if(!CAM.drag){CAM.azim+=CAM.vAzim;CAM.vAzim*=0.86;CAM.polar+=CAM.vPolar;CAM.vPolar*=0.86;CAM.polar=Math.max(0.02,Math.min(Math.PI-0.02,CAM.polar));}
  const{mvp}=buildMVP();
  for(let i=0;i<PLANETS.length;i++) angles[i]+=PLANETS[i].speed*0.00030*speedMul*60*dt;
  const WP=PLANETS.map((p,i)=>[Math.cos(angles[i])*p.orbit,0,Math.sin(angles[i])*p.orbit]);
  for(const p of PLANETS) drawOrbit(mvp,p.orbit);
  const sunSP=proj4(0,0,0,mvp,W,H),sunPR=sunSP?pixRadius(SUN_R,sunSP.w):0;
  if(sunSP&&sunSP.sz<1) drawSun(sunSP,sunPR);
  _screenPts=[];
  const projP=WP.map((wp,i)=>{const sp=proj4(wp[0],wp[1],wp[2],mvp,W,H);if(!sp||sp.sz>1)return null;const pr=pixRadius(PLANETS[i].r,sp.w);_screenPts.push({sx:sp.sx,sy:sp.sy,pr,i});return{sp,pr};});
  const order=[...PLANETS.keys()].filter(i=>projP[i]).sort((a,b)=>projP[b].sp.sz-projP[a].sp.sz);
  for(const i of order) drawPlanet(PLANETS[i],projP[i].sp,projP[i].pr,_hovI===i,angles[i]);
  if(sunSP){const pulse=0.5+0.5*Math.sin(ts*0.0007);const fg=ctx.createRadialGradient(sunSP.sx,sunSP.sy,0,sunSP.sx,sunSP.sy,350);fg.addColorStop(0,`rgba(255,160,0,${0.018*pulse})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);}
  requestAnimationFrame(frame);
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(frame);});
</script>
